name: aPlusTerminal
options:
  bundleIdPrefix: com.aaroncx
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.12.1"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.13.0"
targets:
  aPlusTerminal:
    type: application
    platform: iOS
    entitlements:
      path: aPlusTerminal/aPlusTerminal.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.aaroncx.aplusterminal
    sources:
      - aPlusTerminal
      - path: Resources
        buildPhase: resources
    dependencies:
      - target: aPlusTerminalWidgets
      - package: Citadel
      - package: SwiftTerm
    settings:
      base:
        # Locks into App Store Connect at first upload — do not rename after that.
        PRODUCT_BUNDLE_IDENTIFIER: com.aaroncx.aplusterminal
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # XcodeGen's per-target default is "1,2"; this app is iPhone-only.
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Empty by default (automatic signing). The TestFlight upload script
        # passes CODE_SIGN_STYLE=Manual and these per-target profile names.
        PROVISIONING_PROFILE_SPECIFIER: "$(APLUSTERMINAL_PROFILE_APP)"
        CURRENT_PROJECT_VERSION: "13"
        MARKETING_VERSION: "1.0"
    info:
      path: aPlusTerminal/Info.plist
      properties:
        CFBundleDisplayName: a+Terminal
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        NSLocalNetworkUsageDescription: "a+Terminal browses your local network for SSH servers you choose to add, checks whether your saved servers are reachable, and sends wake packets when you ask. Everything stays on your network — nothing is collected."
        NSBonjourServices:
          - _ssh._tcp.
        NSMicrophoneUsageDescription: "a+Terminal uses the microphone for voice dictation into your terminal. Audio is processed entirely on this device and never uploaded anywhere."
        NSSpeechRecognitionUsageDescription: "a+Terminal transcribes dictation on-device only. Your speech never leaves this iPhone — a+Terminal never falls back to server-based recognition."
        CFBundleURLTypes:
          - CFBundleURLName: com.aaroncx.aplusterminal
            CFBundleURLSchemes:
              - aplusterminal
  aPlusTerminalWidgets:
    type: app-extension
    platform: iOS
    entitlements:
      path: aPlusTerminalWidgets/aPlusTerminalWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.aaroncx.aplusterminal
    sources:
      - aPlusTerminalWidgets
      # Shared with the app target — must compile identically in both.
      - path: aPlusTerminal/LiveActivity/SessionActivityAttributes.swift
      - path: aPlusTerminal/Servers/Server.swift
      - path: aPlusTerminal/Servers/ServerStore.swift
      - path: aPlusTerminal/Network/Reachability.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aaroncx.aplusterminal.widgets
        TARGETED_DEVICE_FAMILY: "1"
        PROVISIONING_PROFILE_SPECIFIER: "$(APLUSTERMINAL_PROFILE_WIDGET)"
        CURRENT_PROJECT_VERSION: "13"
        MARKETING_VERSION: "1.0"
    info:
      path: aPlusTerminalWidgets/Info.plist
      properties:
        CFBundleDisplayName: a+Terminal Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  aPlusTerminalTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - aPlusTerminalTests
    dependencies:
      - target: aPlusTerminal
      # Compile against Citadel but resolve symbols from the host app binary
      # at run time — linking the package twice breaks the test bundle link.
      - package: Citadel
        link: false
  aPlusTerminalUITests:
    type: bundle.ui-testing
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - aPlusTerminalUITests
    dependencies:
      - target: aPlusTerminal
schemes:
  aPlusTerminal:
    build:
      targets:
        aPlusTerminal: all
    run:
      config: Debug
      # Local StoreKit config so the tips are testable in the
      # simulator without App Store Connect.
      storeKitConfiguration: aPlusTerminal.storekit
    test:
      config: Debug
      storeKitConfiguration: aPlusTerminal.storekit
      targets:
        - aPlusTerminalTests
        - aPlusTerminalUITests
