name: Relay
options:
  bundleIdPrefix: com.aaroncx
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.12.1"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.13.0"
targets:
  Relay:
    type: application
    platform: iOS
    sources:
      - Relay
      - path: Resources
        buildPhase: resources
    dependencies:
      - target: RelayWidgets
      - package: Citadel
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aaroncx.relay
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
    info:
      path: Relay/Info.plist
      properties:
        CFBundleDisplayName: a-Terminal
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: "a-Terminal uses the microphone for voice dictation into your terminal. Audio is processed entirely on this device and never uploaded anywhere."
        NSSpeechRecognitionUsageDescription: "a-Terminal transcribes dictation on-device only. Your speech never leaves this iPhone — a-Terminal never falls back to server-based recognition."
        NSFaceIDUsageDescription: "a-Terminal uses Face ID to unlock the app when App Protection is enabled."
        CFBundleURLTypes:
          - CFBundleURLName: com.aaroncx.relay
            CFBundleURLSchemes:
              - relay
  RelayWidgets:
    type: app-extension
    platform: iOS
    sources:
      - RelayWidgets
      # Shared ActivityAttributes — must compile identically in both targets.
      - path: Relay/LiveActivity/SessionActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aaroncx.relay.widgets
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
    info:
      path: RelayWidgets/Info.plist
      properties:
        CFBundleDisplayName: a-Terminal Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  RelayTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - RelayTests
    dependencies:
      - target: Relay
      # Compile against Citadel but resolve symbols from the host app binary
      # at run time — linking the package twice breaks the test bundle link.
      - package: Citadel
        link: false
schemes:
  Relay:
    build:
      targets:
        Relay: all
    run:
      config: Debug
      # Local StoreKit config so tips/subscriptions are testable in the
      # simulator without App Store Connect.
      storeKitConfiguration: Relay.storekit
    test:
      config: Debug
      targets:
        - RelayTests
