name: aTerminal
options:
  bundleIdPrefix: com.aaroncx
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.12.1"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.13.0"
targets:
  aTerminal:
    type: application
    platform: iOS
    sources:
      - aTerminal
      - path: Resources
        buildPhase: resources
    dependencies:
      - target: aTerminalWidgets
      - package: Citadel
      - package: SwiftTerm
    settings:
      base:
        # Locked in App Store Connect since build 1 — do not rename.
        PRODUCT_BUNDLE_IDENTIFIER: com.aaroncx.relay
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # XcodeGen's per-target default is "1,2"; this app is iPhone-only.
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Empty by default (automatic signing). The TestFlight upload script
        # passes CODE_SIGN_STYLE=Manual and these per-target profile names.
        PROVISIONING_PROFILE_SPECIFIER: "$(ATERMINAL_PROFILE_APP)"
        CURRENT_PROJECT_VERSION: "10"
        MARKETING_VERSION: "1.0"
    info:
      path: aTerminal/Info.plist
      properties:
        CFBundleDisplayName: a-Terminal
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: "a-Terminal uses the microphone for voice dictation into your terminal. Audio is processed entirely on this device and never uploaded anywhere."
        NSSpeechRecognitionUsageDescription: "a-Terminal transcribes dictation on-device only. Your speech never leaves this iPhone — a-Terminal never falls back to server-based recognition."
        CFBundleURLTypes:
          - CFBundleURLName: com.aaroncx.relay
            CFBundleURLSchemes:
              - aterminal
  aTerminalWidgets:
    type: app-extension
    platform: iOS
    sources:
      - aTerminalWidgets
      # Shared ActivityAttributes — must compile identically in both targets.
      - path: aTerminal/LiveActivity/SessionActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aaroncx.relay.widgets
        TARGETED_DEVICE_FAMILY: "1"
        PROVISIONING_PROFILE_SPECIFIER: "$(ATERMINAL_PROFILE_WIDGET)"
        CURRENT_PROJECT_VERSION: "10"
        MARKETING_VERSION: "1.0"
    info:
      path: aTerminalWidgets/Info.plist
      properties:
        CFBundleDisplayName: a-Terminal Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  aTerminalTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - aTerminalTests
    dependencies:
      - target: aTerminal
      # Compile against Citadel but resolve symbols from the host app binary
      # at run time — linking the package twice breaks the test bundle link.
      - package: Citadel
        link: false
  aTerminalUITests:
    type: bundle.ui-testing
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - aTerminalUITests
    dependencies:
      - target: aTerminal
schemes:
  aTerminal:
    build:
      targets:
        aTerminal: all
    run:
      config: Debug
      # Local StoreKit config so tips/subscriptions are testable in the
      # simulator without App Store Connect.
      storeKitConfiguration: aTerminal.storekit
    test:
      config: Debug
      storeKitConfiguration: aTerminal.storekit
      targets:
        - aTerminalTests
        - aTerminalUITests
