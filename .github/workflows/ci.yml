name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Supersede in-flight runs for the same ref so stale (expensive, 10x-billed)
# macOS builds don't pile up on rapid pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: echo "DEVELOPER_DIR=$(xcode-select -p)" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build
        run: make build

      - name: Test
        run: make test
