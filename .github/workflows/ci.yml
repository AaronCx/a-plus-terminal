name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Supersede in-flight runs for the same ref so stale (expensive, 10x-billed)
# macOS builds don't pile up on rapid pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: echo "DEVELOPER_DIR=$(xcode-select -p)" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      # Resolve SPM packages as an explicit, fail-fast step against the
      # committed Package.resolved, so a dependency-resolution problem is
      # distinguishable from a compile failure in the Build step below.
      - name: Resolve packages
        run: |
          make generate
          xcodebuild -project aPlusTerminal.xcodeproj -scheme aPlusTerminal -resolvePackageDependencies

      - name: Build
        run: make build

      - name: Test
        run: make test
